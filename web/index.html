<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Homestead</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────────────────── -->
  <header class="header">
    <div class="header-inner">

      <div class="brand">
        <span id="site-logo" class="brand-logo" aria-hidden="true">🏠</span>
        <div>
          <h1 id="site-title" class="brand-title">Homestead</h1>
          <p  id="site-subtitle" class="brand-subtitle"></p>
        </div>
      </div>

      <div class="header-actions">
        <!-- Search -->
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input id="search" type="text" placeholder="Search…" autocomplete="off" spellcheck="false" />
          <kbd class="search-kbd" title="Press / to search">/</kbd>
        </div>

        <!-- Refresh -->
        <button id="btn-refresh" class="icon-btn" title="Refresh status checks">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/>
            <polyline points="1 20 1 14 7 14"/>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
          </svg>
        </button>
      </div>

    </div>
  </header>

  <!-- ── Main content ───────────────────────────────────────────────── -->
  <main class="main">
    <div id="sections"></div>

    <!-- Empty search state -->
    <div id="empty-state" class="empty-state" hidden>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <p>No results for "<span id="empty-query"></span>"</p>
    </div>

    <!-- Loading state -->
    <div id="loading-state" class="loading-state">
      <div class="spinner"></div>
      <p>Loading dashboard…</p>
    </div>
  </main>

  <!-- ── Footer ─────────────────────────────────────────────────────── -->
  <footer class="footer">
    <span id="footer-text"></span>
    <span class="footer-sep" aria-hidden="true">·</span>
    <span class="footer-brand">Homestead</span>
  </footer>

  <!-- ── Toast notifications ────────────────────────────────────────── -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="/app.js"></script>
</body>
</html>

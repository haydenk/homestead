name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.2.2)'
        required: true
        type: string
      dry_run:
        description: 'Dry run — build and test without publishing'
        required: false
        type: boolean
        default: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  # ── 1. Build & test ──────────────────────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Build
        run: mise run build

      - name: Test
        run: mise run test

  # ── 2. Cross-platform binaries + linux packages ───────────────────────────────
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: test
    runs-on: ubuntu-latest
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      OUTPUT: dist/homestead_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.ext }}
    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64, package: true  }
          - { goos: linux,   goarch: arm64, package: true  }
          - { goos: darwin,  goarch: amd64                 }
          - { goos: darwin,  goarch: arm64                 }
          - { goos: windows, goarch: amd64, ext: .exe      }
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Build binary
        run: mise run build

      - name: Stage binary for nfpm
        if: matrix.package
        run: cp "$OUTPUT" homestead

      - name: Build packages
        if: matrix.package
        run: mise run package

      - name: Remove staged binary
        if: matrix.package
        run: rm -f homestead

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dist-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  # ── 3. GitHub release ─────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist/

      - name: Extract changelog for ${{ env.RELEASE_TAG }}
        id: changelog
        run: |
          notes=$(awk -v ver="${{ env.RELEASE_TAG }}" '
            /^## \[/ { if (found) exit; if (index($0, "[" ver "]")) found=1; next }
            found { print }
          ' CHANGELOG.md | awk 'NF{found=NR} {lines[NR]=$0} END{for(i=1;i<=found;i++) print lines[i]}')
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$notes" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        if: ${{ !inputs.dry_run }}
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: dist/**
          body: ${{ steps.changelog.outputs.notes }}

  # ── 4. Docker image → GHCR ───────────────────────────────────────────────────
  docker:
    name: Docker Image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ env.RELEASE_TAG }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.RELEASE_TAG }}
            type=semver,pattern={{major}},value=${{ env.RELEASE_TAG }}
            type=raw,value=latest

      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          build-args: VERSION=${{ env.RELEASE_TAG }}
          push: ${{ !inputs.dry_run }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

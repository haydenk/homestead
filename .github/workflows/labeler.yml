name: Labeler

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  issues:
    types: [opened, edited]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  # ── Label PRs by changed files ───────────────────────────────────────────────
  label-pr:
    name: Label PR
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b # v6.0.1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: false

  # ── Label issues by PR branch prefix in title ────────────────────────────────
  label-issue:
    name: Label Issue
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const body  = (context.payload.issue.body || '').toLowerCase();
            const text  = title + ' ' + body;

            const labels = [];

            // Template-based labels are already applied via ISSUE_TEMPLATE labels: field.
            // Add supplemental labels based on keywords.

            if (/\b(docker|container|image|ghcr)\b/.test(text))    labels.push('docker');
            if (/\b(config|toml|configuration|section|item)\b/.test(text)) labels.push('configuration');
            if (/\b(ui|frontend|css|style|theme|dark|light|layout)\b/.test(text)) labels.push('ui');
            if (/\b(health.?check|status|up|down|monitor)\b/.test(text)) labels.push('health-check');
            if (/\b(package|deb|rpm|apk|systemd|service)\b/.test(text)) labels.push('packaging');
            if (/\b(doc|readme|changelog|comment)\b/.test(text))   labels.push('documentation');
            if (/\b(ci|cd|action|workflow|pipeline|release)\b/.test(text)) labels.push('ci/cd');

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.payload.issue.number,
                labels,
              });
            }

name: CI

on:
  push:
    branches: [master, develop, 'release/**', 'hotfix/**']
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'CODE_OF_CONDUCT.md'
      - 'SECURITY.md'
  pull_request:
    branches: [master, develop]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'CODE_OF_CONDUCT.md'
      - 'SECURITY.md'

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Build
        run: mise run build

      - name: Test
        run: mise run test

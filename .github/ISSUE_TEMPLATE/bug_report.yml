name: Bug Report
description: Something isn't working as expected.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out all relevant sections — the more detail, the faster we can help.

  - type: input
    id: version
    attributes:
      label: Homestead version
      placeholder: "e.g. 0.1.0  (check the release tag or binary output)"
    validations:
      required: true

  - type: dropdown
    id: install_method
    attributes:
      label: Installation method
      options:
        - Binary (from GitHub releases)
        - Docker
        - deb package
        - rpm package
        - apk package
        - Built from source
    validations:
      required: true

  - type: input
    id: platform
    attributes:
      label: OS / Platform
      placeholder: "e.g. Ubuntu 24.04 LTS x86_64, Raspberry Pi OS Bookworm arm64, macOS 15 (Apple Silicon)"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: "When I do X, Y happens instead of Z."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start homestead with `./homestead -config config.toml`
        2. Open the dashboard
        3. ...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Relevant config snippet
      description: Paste the relevant part of your `config.toml`. **Remove any private URLs or sensitive info.**
      render: toml
      placeholder: |
        [[sections]]
        name = "Media"

          [[sections.items]]
          title       = "Jellyfin"
          url         = "http://jellyfin.lan:8096"
          status_check = true

  - type: textarea
    id: logs
    attributes:
      label: Log output
      description: Paste any relevant log lines from homestead's stderr output.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, links, or anything else that might help.
